<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 530" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="800" height="530" fill="#fafafa" rx="6"/>
  <text x="400" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#111">CavitySense — Wiring Diagram</text>

  <!-- ════════════════════════════════════════════════════════
       ARDUINO UNO Q
       ════════════════════════════════════════════════════════ -->
  <g transform="translate(30, 40)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="170" rx="6" fill="#fff" stroke="#0887C7" stroke-width="2"/>

    <!-- USB-C -->
    <rect x="-2" y="60" width="14" height="40" rx="3" fill="#333"/>
    <rect x="3" y="66" width="4" height="28" rx="1" fill="#555"/>
    <text x="18" y="88" font-size="7" fill="#999">USB-C</text>

    <!-- STM32 + Linux -->
    <rect x="50" y="32" width="260" height="36" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <text x="180" y="48" text-anchor="middle" font-size="9" fill="#444">STM32U585 (Zephyr) + Linux co-processor</text>
    <text x="180" y="60" text-anchor="middle" font-size="7" fill="#888">Dual-core Arduino UNO Q</text>

    <!-- LED Matrix -->
    <rect x="50" y="85" width="260" height="30" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
    <text x="180" y="102" text-anchor="middle" font-size="9" fill="#7cff7c" font-weight="600">LED Matrix (13 × 8 grayscale)</text>
    <text x="180" y="112" text-anchor="middle" font-size="6" fill="#888">built-in display</text>

    <!-- ▸ TOP HEADER — DIGITAL -->
    <g font-size="6.5" fill="#444">
      <text x="350" y="14" text-anchor="end" font-size="7.5" fill="#0887C7" font-weight="600">TOP HEADER — DIGITAL</text>
      <!-- D13..D0, GND, AREF  — rects at y=18, labels at y=36 -->
      <rect x="334" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="342" y="36" text-anchor="middle" font-size="6.5">D13</text>
      <rect x="312" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="320" y="36" text-anchor="middle">D12</text>
      <rect x="290" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="298" y="36" text-anchor="middle">D11</text>
      <rect x="268" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="276" y="36" text-anchor="middle">D10</text>
      <rect x="246" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="254" y="36" text-anchor="middle">D9</text>
      <rect x="224" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="232" y="36" text-anchor="middle">D8</text>
      <rect x="202" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="210" y="36" text-anchor="middle">D7</text>
      <rect x="180" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="188" y="36" text-anchor="middle">D6</text>
      <rect x="158" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="166" y="36" text-anchor="middle">D5</text>
      <rect x="136" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="144" y="36" text-anchor="middle">D4</text>
      <rect x="114" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="122" y="36" text-anchor="middle">D3</text>
      <rect x="92" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="100" y="36" text-anchor="middle">D2</text>
      <rect x="70" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="78" y="36" text-anchor="middle">D1</text>
      <rect x="48" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="56" y="36" text-anchor="middle">D0</text>
      <rect x="26" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="34" y="36" text-anchor="middle">GND</text>
      <rect x="4" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="12" y="36" text-anchor="middle">AREF</text>
    </g>

    <!-- ▸ BOTTOM HEADER — POWER / ANALOG -->
    <g font-size="6.5" fill="#444">
      <text x="350" y="165" text-anchor="end" font-size="7.5" fill="#0887C7" font-weight="600">BOTTOM HEADER — POWER / ANALOG</text>
      <!-- VIN, GND, 5V, 3V3, A5..A0, GND  — rects at y=140, labels at y=132 -->
      <rect x="334" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="342" y="132" text-anchor="middle">VIN</text>
      <rect x="312" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="320" y="132" text-anchor="middle">GND</text>
      <rect x="290" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="298" y="132" text-anchor="middle">5V</text>
      <rect x="268" y="140" width="16" height="12" rx="1" fill="#ffcccc" stroke="#c62828" stroke-width="2"/>
      <text x="276" y="132" text-anchor="middle" fill="#c62828" font-weight="700">3V3</text>
      <rect x="246" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="254" y="132" text-anchor="middle">A5</text>
      <rect x="224" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="232" y="132" text-anchor="middle">A4</text>
      <rect x="202" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="210" y="132" text-anchor="middle">A3</text>
      <rect x="180" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="188" y="132" text-anchor="middle">A2</text>
      <rect x="158" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="166" y="132" text-anchor="middle">A1</text>
      <rect x="136" y="140" width="16" height="12" rx="1" fill="#dde8ff" stroke="#1565c0" stroke-width="2"/>
      <text x="144" y="132" text-anchor="middle" fill="#1565c0" font-weight="700">A0</text>
      <rect x="114" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="122" y="132" text-anchor="middle">GND</text>
    </g>
  </g>

  <!-- ════════════════════════════════════════════════════════
       ELV MEMS1 MODULE
       ════════════════════════════════════════════════════════ -->
  <g transform="translate(500, 330)" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="120" rx="6" fill="#fff" stroke="#2a9d46" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="26" rx="6" fill="#2a9d46"/>
    <rect x="0" y="20" width="220" height="6" fill="#2a9d46"/>
    <text x="110" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">ELV MEMS1 Module</text>

    <text x="110" y="48" text-anchor="middle" font-size="8" fill="#2a9d46" font-weight="600">SPU0410LR5H-QB analog MEMS microphone</text>

    <!-- MEMS sensor -->
    <rect x="60" y="56" width="100" height="28" rx="4" fill="#e8f5e9" stroke="#2a9d46" stroke-width="1.5"/>
    <text x="110" y="73" text-anchor="middle" font-size="10" fill="#2a9d46" font-weight="600">MEMS</text>

    <!-- Pins on top -->
    <g>
      <rect x="28" y="-2" width="14" height="16" rx="2" fill="#ffcccc" stroke="#c62828" stroke-width="2"/>
      <text x="19" y="-8" text-anchor="end" font-size="8" fill="#c62828" font-weight="700">VDD</text>
      <rect x="103" y="-2" width="14" height="16" rx="2" fill="#e8e8e8" stroke="#666" stroke-width="1.5"/>
      <text x="94" y="-8" text-anchor="end" font-size="8" fill="#444" font-weight="700">GND</text>
      <rect x="178" y="-2" width="14" height="16" rx="2" fill="#dde8ff" stroke="#1565c0" stroke-width="2"/>
      <text x="169" y="-8" text-anchor="end" font-size="8" fill="#1565c0" font-weight="700">OUT</text>
    </g>
  </g>

  <!-- ════════════════════════════════════════════════════════
       WIRING — orthogonal routing
       ════════════════════════════════════════════════════════ -->

  <!--
    Connection points (global):
    UNO Q bottom header — pins bottom edge at y = 40 + 140 + 12 = 192
      3V3: center x = 30 + 268 + 8 = 306
      A0:  center x = 30 + 136 + 8 = 174
      GND (near A0): center x = 30 + 114 + 8 = 152

    ELV MEMS1 top header — pins top edge at y = 330 - 2 = 328
      VDD: center x = 500 + 28 + 7 = 535
      GND: center x = 500 + 103 + 7 = 610
      OUT: center x = 500 + 178 + 7 = 685
  -->

  <!-- WIRE 1: 3V3 → VDD (red) -->
  <path d="M 306,192 L 306,245 L 535,245 L 535,326"
        fill="none" stroke="#c62828" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="306" cy="192" r="3.5" fill="#c62828"/>
  <polygon points="535,322 531,330 539,330" fill="#c62828"/>
  <rect x="360" y="237" width="130" height="18" rx="3" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
  <text x="425" y="250" text-anchor="middle" font-size="10" fill="#c62828" font-weight="700">3V3 → VDD</text>

  <!-- WIRE 2: GND → GND (black) -->
  <path d="M 152,192 L 152,270 L 610,270 L 610,326"
        fill="none" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="152" cy="192" r="3.5" fill="#222"/>
  <polygon points="610,322 606,330 614,330" fill="#222"/>
  <rect x="380" y="262" width="120" height="18" rx="3" fill="#eee" stroke="#333" stroke-width="1"/>
  <text x="440" y="275" text-anchor="middle" font-size="10" fill="#333" font-weight="700">GND → GND</text>

  <!-- WIRE 3: A0 → OUT (blue, solid) -->
  <path d="M 174,192 L 174,295 L 685,295 L 685,326"
        fill="none" stroke="#1565c0" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="174" cy="192" r="3.5" fill="#1565c0"/>
  <polygon points="685,322 681,330 689,330" fill="#1565c0"/>
  <rect x="360" y="287" width="130" height="18" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="425" y="300" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="700">A0 → OUT</text>

  <!-- ════════════════════════════════════════════════════════
       FOOTER NOTES
       ════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 485)">
    <rect x="0" y="0" width="720" height="35" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
    <text x="14" y="15" font-size="10" fill="#856404" font-weight="600">Notes:</text>
    <text x="14" y="28" font-size="9" fill="#684c0a">Power from 3V3 only (not 5V).</text>
    <text x="200" y="28" font-size="9" fill="#684c0a">Keep jumper wires &lt; 15 cm.</text>
    <!-- Legend -->
    <line x1="500" y1="9" x2="518" y2="9" stroke="#c62828" stroke-width="2.5"/>
    <text x="522" y="13" font-size="8" fill="#c62828">Power</text>
    <line x1="500" y1="23" x2="518" y2="23" stroke="#222" stroke-width="2.5"/>
    <text x="522" y="27" font-size="8" fill="#222">Ground</text>
    <line x1="570" y1="9" x2="588" y2="9" stroke="#1565c0" stroke-width="2.5"/>
    <text x="592" y="13" font-size="8" fill="#1565c0">Signal</text>
  </g>
</svg>
