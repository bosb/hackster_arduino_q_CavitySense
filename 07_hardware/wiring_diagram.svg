<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4"><circle cx="4" cy="4" r="3" fill="#222"/></marker>
  </defs>
  <rect width="800" height="580" fill="#fafafa" rx="6"/>
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#111">CavitySense — Wiring Diagram</text>

  <!-- ════════════════════════════════════════════════════════
       ARDUINO UNO Q (top)
       ════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 50)" filter="url(#shadow)">
    <rect x="0" y="0" width="340" height="170" rx="6" fill="#fff" stroke="#0887C7" stroke-width="2"/>
    <!-- USB-C -->
    <rect x="-2" y="60" width="14" height="40" rx="3" fill="#333"/>
    <rect x="3" y="65" width="5" height="30" rx="1" fill="#555"/>
    <text x="18" y="88" font-size="7" fill="#999">USB-C</text>
    <!-- STM32 + Linux label -->
    <rect x="50" y="30" width="240" height="40" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <text x="170" y="48" text-anchor="middle" font-size="9" fill="#444">STM32U585 (Zephyr) + Linux co-processor</text>
    <text x="170" y="62" text-anchor="middle" font-size="7" fill="#888">Dual-core Arduino UNO Q</text>
    <!-- LED Matrix -->
    <rect x="50" y="90" width="240" height="32" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
    <text x="170" y="108" text-anchor="middle" font-size="9" fill="#7cff7c" font-weight="600">LED Matrix (13 × 8 grayscale)</text>
    <text x="170" y="118" text-anchor="middle" font-size="6" fill="#888">built-in display</text>

    <!-- ▸ Top header — DIGITAL: D13 … D0, GND, AREF (leftward from D13) -->
    <g font-size="6.5" fill="#444">
      <text x="340" y="14" text-anchor="end" font-size="8" fill="#0887C7" font-weight="700">TOP HEADER — DIGITAL</text>
      <!-- D13 -->
      <rect x="324" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="332" y="36" text-anchor="middle">D13</text>
      <rect x="302" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="310" y="36" text-anchor="middle">D12</text>
      <rect x="280" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="288" y="36" text-anchor="middle">D11</text>
      <rect x="258" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="266" y="36" text-anchor="middle">D10</text>
      <rect x="236" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="244" y="36" text-anchor="middle">D9</text>
      <rect x="214" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="222" y="36" text-anchor="middle">D8</text>
      <rect x="192" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="200" y="36" text-anchor="middle">D7</text>
      <rect x="170" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="178" y="36" text-anchor="middle">D6</text>
      <rect x="148" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="156" y="36" text-anchor="middle">D5</text>
      <rect x="126" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="134" y="36" text-anchor="middle">D4</text>
      <rect x="104" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="112" y="36" text-anchor="middle">D3</text>
      <rect x="82" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="90" y="36" text-anchor="middle">D2</text>
      <rect x="60" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="68" y="36" text-anchor="middle">D1</text>
      <rect x="38" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="46" y="36" text-anchor="middle">D0</text>
      <rect x="16" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="24" y="36" text-anchor="middle">GND</text>
      <rect x="-6" y="18" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="2" y="36" text-anchor="middle">AREF</text>
    </g>

    <!-- ▸ Bottom header — PWR + ANALOG: VIN, GND, 5V, 3V3, A5…A0, GND -->
    <g font-size="6.5" fill="#444">
      <text x="340" y="156" text-anchor="end" font-size="8" fill="#0887C7" font-weight="700">BOTTOM HEADER — POWER / ANALOG</text>
      <rect x="324" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="332" y="134" text-anchor="middle">VIN</text>
      <rect x="302" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="310" y="134" text-anchor="middle">GND</text>
      <rect x="280" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="288" y="134" text-anchor="middle">5V</text>
      <!-- 3V3 — highlighted -->
      <rect x="258" y="140" width="16" height="12" rx="1" fill="#ffcccc" stroke="#c62828" stroke-width="2"/>
      <text x="266" y="134" text-anchor="middle" fill="#c62828" font-weight="700">3V3</text>
      <rect x="236" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="244" y="134" text-anchor="middle">A5</text>
      <rect x="214" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="222" y="134" text-anchor="middle">A4</text>
      <rect x="192" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="200" y="134" text-anchor="middle">A3</text>
      <rect x="170" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="178" y="134" text-anchor="middle">A2</text>
      <rect x="148" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="156" y="134" text-anchor="middle">A1</text>
      <!-- A0 — highlighted -->
      <rect x="126" y="140" width="16" height="12" rx="1" fill="#dde8ff" stroke="#1565c0" stroke-width="2"/>
      <text x="134" y="134" text-anchor="middle" fill="#1565c0" font-weight="700">A0</text>
      <rect x="104" y="140" width="16" height="12" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
      <text x="112" y="134" text-anchor="middle">GND</text>
    </g>
  </g>

  <!-- ════════════════════════════════════════════════════════
       ELV MEMS1 MODULE (bottom)
       ════════════════════════════════════════════════════════ -->
  <g transform="translate(500, 330)" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="180" rx="6" fill="#fff" stroke="#2a9d46" stroke-width="2"/>
    <!-- Header -->
    <rect x="0" y="0" width="220" height="28" rx="6" fill="#2a9d46"/>
    <rect x="0" y="22" width="220" height="6" fill="#2a9d46"/>
    <text x="110" y="19" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">ELV MEMS1 Module</text>

    <text x="110" y="50" text-anchor="middle" font-size="8" fill="#2a9d46" font-weight="600">SPU0410LR5H-QB analog MEMS microphone</text>

    <!-- Sensor element -->
    <rect x="50" y="60" width="120" height="30" rx="4" fill="#e8f5e9" stroke="#2a9d46" stroke-width="1.5"/>
    <text x="110" y="78" text-anchor="middle" font-size="10" fill="#2a9d46" font-weight="600">MEMS</text>

    <!-- Onboard caps area -->
    <rect x="15" y="105" width="190" height="36" rx="4" fill="#fffde7" stroke="#f9a825" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="110" y="118" text-anchor="middle" font-size="8" fill="#856404">Onboard passive components</text>

    <!-- C1 -->
    <rect x="25" y="108" width="28" height="14" rx="2" fill="#fff3cd" stroke="#e6a700" stroke-width="1"/>
    <text x="39" y="118" text-anchor="middle" font-size="8" fill="#856404" font-weight="700">C1</text>
    <text x="60" y="115" font-size="7" fill="#856404">1 µF DC-block</text>

    <!-- C2 -->
    <rect x="167" y="108" width="28" height="14" rx="2" fill="#fff3cd" stroke="#e6a700" stroke-width="1"/>
    <text x="181" y="118" text-anchor="middle" font-size="8" fill="#856404" font-weight="700">C2</text>
    <text x="146" y="115" font-size="7" fill="#856404">1 µF decouple</text>

    <!-- ▸ Pins on TOP of module (facing UNO Q) -->
    <g>
      <!-- VDD -->
      <rect x="28" y="-2" width="14" height="16" rx="2" fill="#ffcccc" stroke="#c62828" stroke-width="2"/>
      <text x="19" y="-8" text-anchor="end" font-size="8" fill="#c62828" font-weight="700">VDD</text>
      <!-- GND -->
      <rect x="103" y="-2" width="14" height="16" rx="2" fill="#e8e8e8" stroke="#666" stroke-width="1.5"/>
      <text x="94" y="-8" text-anchor="end" font-size="8" fill="#444" font-weight="700">GND</text>
      <!-- OUT -->
      <rect x="178" y="-2" width="14" height="16" rx="2" fill="#dde8ff" stroke="#1565c0" stroke-width="2"/>
      <text x="169" y="-8" text-anchor="end" font-size="8" fill="#1565c0" font-weight="700">OUT</text>
    </g>
  </g>

  <!-- ════════════════════════════════════════════════════════
       WIRING — schematic orthogonal routing
       ════════════════════════════════════════════════════════ -->

  <!--
    Connection points (global coords):
    UNO Q bottom header — pins bottom edge at y = 50 + 140 + 12 = 202
      - 3V3: center x = 40 + 258 + 8 = 306
      - A0:  center x = 40 + 126 + 8 = 174
    ELV MEMS1 top header — pins top edge at y = 330 - 2 = 328
      - VDD: center x = 500 + 28 + 7 = 535
      - GND: center x = 500 + 103 + 7 = 610
      - OUT: center x = 500 + 178 + 7 = 685

    Wires go DOWN from UNO Q pins, then RIGHT horizontally, then UP to ELV MEMS1 pins.
  -->

  <!-- WIRE 1: 3V3 → VDD (red) -->
  <path d="M 306,204 L 306,250 L 535,250 L 535,326"
        fill="none" stroke="#c62828" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Start dot -->
  <circle cx="306" cy="204" r="4" fill="#c62828"/>
  <!-- End arrow -->
  <polygon points="535,322 531,330 539,330" fill="#c62828"/>
  <!-- Net label box -->
  <rect x="360" y="242" width="130" height="18" rx="3" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
  <text x="425" y="255" text-anchor="middle" font-size="10" fill="#c62828" font-weight="700">3V3 → VDD</text>

  <!-- WIRE 2: GND (near A0) → GND (black) -->
  <path d="M 152,204 L 152,275 L 610,275 L 610,326"
        fill="none" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="152" cy="204" r="4" fill="#222"/>
  <polygon points="610,322 606,330 614,330" fill="#222"/>
  <!-- GND symbol (T) -->
  <line x1="152" y1="230" x2="152" y2="242" stroke="#222" stroke-width="2.5"/>
  <line x1="145" y1="242" x2="159" y2="242" stroke="#222" stroke-width="3"/>
  <rect x="380" y="267" width="120" height="18" rx="3" fill="#eee" stroke="#333" stroke-width="1"/>
  <text x="440" y="280" text-anchor="middle" font-size="10" fill="#333" font-weight="700">GND → GND</text>

  <!-- WIRE 3: A0 → OUT (blue, dashed) -->
  <path d="M 174,204 L 174,300 L 685,300 L 685,326"
        fill="none" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="8,5" stroke-linejoin="round"/>
  <circle cx="174" cy="204" r="4" fill="#1565c0"/>
  <polygon points="685,322 681,330 689,330" fill="#1565c0"/>
  <rect x="360" y="292" width="130" height="18" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="425" y="305" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="700">A0 → OUT</text>

  <!-- ════════════════════════════════════════════════════════
       FOOTER NOTES
       ════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 535)">
    <rect x="0" y="0" width="720" height="35" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
    <text x="14" y="15" font-size="10" fill="#856404" font-weight="600">Notes:</text>
    <text x="14" y="28" font-size="9" fill="#684c0a">
      No external components required — C1 (1 µF DC-block) and C2 (1 µF decouple) are onboard.
    </text>
    <text x="340" y="15" font-size="9" fill="#684c0a">Power from 3V3 only (not 5V).</text>
    <text x="340" y="28" font-size="9" fill="#684c0a">Keep jumper wires &lt; 15 cm.</text>
    <!-- Legend -->
    <line x1="600" y1="9" x2="618" y2="9" stroke="#c62828" stroke-width="2.5"/>
    <text x="622" y="13" font-size="8" fill="#c62828">Power</text>
    <line x1="600" y1="23" x2="618" y2="23" stroke="#222" stroke-width="2.5"/>
    <text x="622" y="27" font-size="8" fill="#222">Ground</text>
    <line x1="672" y1="9" x2="690" y2="9" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="5,3"/>
    <text x="694" y="13" font-size="8" fill="#1565c0">Signal</text>
  </g>
</svg>
